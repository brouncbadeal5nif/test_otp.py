<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thuê OTP Nhanh</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- FontAwesome & Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Header (Wallet Balance) -->
        <header class="glass-header">
            <div class="user-info">
                <div class="avatar" id="user-avatar"><i class="fa-solid fa-user"></i></div>
                <div class="greeting">
                    <span class="hello">Xin chào,</span>
                    <span class="name" id="user-name">Khách</span>
                </div>
            </div>
            <div class="balance-card">
                <div class="balance-label">Số dư hiện tại</div>
                <div class="balance-amount"><span id="balance-value">---</span> đ</div>
                <button class="btn-deposit" onclick="Telegram.WebApp.close()">Nạp Tiền</button>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="search-container">
            <i class="fa-solid fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="Tìm kiếm dịch vụ (VD: Facebook, Telegram...)">
        </div>

        <!-- Service List -->
        <main class="service-list" id="service-list">
            <div class="loading-services">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Đang tải dịch vụ...
            </div>
            <!-- Services will be injected here via JS -->
        </main>

        <!-- Active Session Footer (Hidden by default) -->
        <div id="active-session" class="active-session hidden glass-panel">
            <div class="session-header">
                <span class="service-name" id="active-service-name">Dịch Vụ</span>
                <button class="btn-cancel" id="btn-cancel-session"><i class="fa-solid fa-times"></i> Hủy</button>
            </div>
            
            <div class="phone-display" id="phone-display" onclick="copyToClipboard('phone-value', 'Số điện thoại')">
                <div class="phone-number" id="phone-value">Đang lấy số...</div>
                <i class="fa-regular fa-copy copy-icon"></i>
            </div>

            <div class="otp-status">
                <div class="status-indicator waiting" id="otp-indicator"></div>
                <span id="otp-text">Đang chờ tin nhắn...</span>
            </div>

            <div class="otp-display hidden" id="otp-display" onclick="copyToClipboard('otp-value', 'Mã OTP')">
                <div class="otp-code" id="otp-value">------</div>
                <i class="fa-regular fa-copy copy-icon"></i>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast hidden">Nội dung thông báo</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
