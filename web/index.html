<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thuê OTP Nhanh</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- FontAwesome & Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Header (Wallet Balance) -->
        <header class="glass-header">
            <div class="user-info">
                <div class="avatar" id="user-avatar"><i class="fa-solid fa-user"></i></div>
                <div class="greeting">
                    <span class="hello">Xin chào,</span>
                    <span class="name" id="user-name">Khách</span>
                </div>
            </div>
            <div class="balance-card">
                <div class="balance-label">Số dư hiện tại</div>
                <div class="balance-amount"><span id="balance-value">---</span> đ</div>
                <button class="btn-deposit" onclick="Telegram.WebApp.close()">Nạp Tiền</button>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="search-container">
            <i class="fa-solid fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="Tìm kiếm dịch vụ (VD: Facebook, Telegram...)">
        </div>

        <!-- Service List -->
        <main class="service-list" id="service-list">
            <div class="loading-services">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Đang tải dịch vụ...
            </div>
            <!-- Services will be injected here via JS -->
        </main>

        <!-- Carrier Selection Modal -->
        <div id="carrier-modal" class="modal hidden">
            <div class="modal-content glass-panel">
                <h3 id="modal-service-name">Chọn nhà mạng</h3>
                <p id="modal-service-price" class="modal-price">---</p>
                
                <div class="carrier-grid">
                    <button class="btn-carrier" onclick="submitRent(null)">Ngẫu nhiên</button>
                    <button class="btn-carrier" onclick="submitRent('Viettel')">Viettel</button>
                    <button class="btn-carrier" onclick="submitRent('Vina')">Vina</button>
                    <button class="btn-carrier" onclick="submitRent('Mobi')">Mobi</button>
                    <button class="btn-carrier" onclick="submitRent('VNMB')">VNMB</button>
                    <button class="btn-carrier" onclick="submitRent('ITelecom')">ITelecom</button>
                </div>
                
                <button class="btn-close-modal" onclick="closeCarrierModal()">Đóng</button>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast hidden">Nội dung thông báo</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
